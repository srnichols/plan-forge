name: Capabilities Discovery Drift

# Fails PRs whose discovery surfaces drift from the auto-generated source of truth.
#
# Two checks (both hard gates):
#   1. docs/capabilities.md MCP Tools table vs. pforge-mcp/tools.json
#   2. docs/manual counts + glossary terms vs. MANUAL_COUNTS / glossary.html
#
# Source of truth:
#   - pforge-mcp/tools.json          (auto-generated by MCP server boot)
#   - pforge-mcp/enums.mjs           (TOOL_NAMES — canonical tool order)
#   - pforge-mcp/capabilities.mjs    (TOOL_METADATA — intent + cost)
#   - docs/manual/assets/manual.js   (MANUAL_COUNTS)
#
# Scanners:
#   - scripts/generate-capabilities-doc.mjs --check
#   - docs/manual/maintain.mjs --audit
#
# Triggers on planning/main (dev branch) in addition to main/master so drift
# never silently lands in a feature branch before it can be merged.

on:
  push:
    branches: [main, master, planning/main]
    paths:
      - 'docs/capabilities.md'
      - 'docs/manual/**'
      - 'pforge-mcp/enums.mjs'
      - 'pforge-mcp/capabilities.mjs'
      - 'pforge-mcp/capabilities/**'
      - 'pforge-mcp/tools.json'
      - 'scripts/generate-capabilities-doc.mjs'
      - 'docs/manual/maintain.mjs'
  pull_request:
    branches: [main, master, planning/main]
    paths:
      - 'docs/capabilities.md'
      - 'docs/manual/**'
      - 'pforge-mcp/enums.mjs'
      - 'pforge-mcp/capabilities.mjs'
      - 'pforge-mcp/capabilities/**'
      - 'pforge-mcp/tools.json'
      - 'scripts/generate-capabilities-doc.mjs'
      - 'docs/manual/maintain.mjs'

jobs:
  check-capabilities-doc:
    name: Capabilities doc / tools.json sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify docs/capabilities.md is in sync with tools.json
        run: node scripts/generate-capabilities-doc.mjs --check

      - name: Verify manual counts + glossary are in sync
        run: node docs/manual/maintain.mjs --audit
