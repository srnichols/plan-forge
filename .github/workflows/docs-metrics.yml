name: Docs Metrics Drift

# Fails PRs that introduce stale metric aliases (old tool counts, tab counts,
# test counts, version badges) in user-facing documentation surfaces.
# Source of truth: docs/_metrics.json
# Scanner:         scripts/check-metrics.ps1

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'scripts/check-metrics.ps1'
  pull_request:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'scripts/check-metrics.ps1'

jobs:
  check-metrics:
    name: Scan for stale metric aliases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run metrics drift checker (strict)
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-metrics.ps1 -Strict
