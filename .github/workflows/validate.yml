name: Validate Setup
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-powershell:
    name: Validate (PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup wizard (dotnet preset, non-interactive)
        shell: pwsh
        run: |
          $testDir = "$env:RUNNER_TEMP\test-project"
          New-Item -ItemType Directory -Path $testDir -Force
          .\setup.ps1 -Preset dotnet -ProjectPath $testDir -ProjectName "TestProject" -Force

      - name: Run validation
        shell: pwsh
        run: |
          $testDir = "$env:RUNNER_TEMP\test-project"
          .\validate-setup.ps1 -ProjectPath $testDir

  validate-bash:
    name: Validate (Bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup wizard (typescript preset, non-interactive)
        run: |
          TEST_DIR="$RUNNER_TEMP/test-project"
          mkdir -p "$TEST_DIR"
          chmod +x setup.sh
          ./setup.sh --preset typescript --path "$TEST_DIR" --name "TestProject" --force

      - name: Run validation
        run: |
          TEST_DIR="$RUNNER_TEMP/test-project"
          chmod +x validate-setup.sh
          ./validate-setup.sh --path "$TEST_DIR"

  validate-all-presets:
    name: Validate All Presets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        preset: [dotnet, typescript, python, java, go, custom]
    steps:
      - uses: actions/checkout@v4

      - name: Run setup (${{ matrix.preset }})
        run: |
          TEST_DIR="$RUNNER_TEMP/test-${{ matrix.preset }}"
          mkdir -p "$TEST_DIR"
          chmod +x setup.sh
          ./setup.sh --preset ${{ matrix.preset }} --path "$TEST_DIR" --name "Test" --force

      - name: Validate (${{ matrix.preset }})
        run: |
          TEST_DIR="$RUNNER_TEMP/test-${{ matrix.preset }}"
          chmod +x validate-setup.sh
          ./validate-setup.sh --path "$TEST_DIR"

  pforge-mcp-tests:
    name: pforge-mcp vitest suite
    # v2.82.2 follow-up — historically `pforge-mcp/tests/` was not run in CI,
    # so 35+ baseline failures accumulated unnoticed. This job runs the full
    # vitest suite on every PR + push, fails the build if any new test breaks,
    # and tolerates the documented baseline failures (tracked in a GitHub
    # issue) until they're fixed bucket by bucket.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pforge-mcp/package.json

      - name: Install dependencies
        working-directory: pforge-mcp
        run: npm install --no-audit --no-fund

      - name: Run vitest (full suite)
        working-directory: pforge-mcp
        # Allow up to BASELINE_FAILURES failing tests so we get visibility
        # into regressions without being blocked by the pre-existing baseline.
        # Drop this number as buckets are fixed (currently 31 after Bucket C
        # was repaired in v2.82.2). Set to 0 once the suite is fully green.
        env:
          BASELINE_FAILURES: "35"
        run: |
          set +e
          npx vitest run --reporter=json --outputFile=vitest-results.json 2>&1 | tail -200
          set -e
          NUM_FAILED="$(node -e "const r=require('./vitest-results.json'); console.log(r.numFailedTests || 0)")"
          NUM_PASSED="$(node -e "const r=require('./vitest-results.json'); console.log(r.numPassedTests || 0)")"
          echo ""
          echo "vitest result: $NUM_PASSED passed, $NUM_FAILED failed (baseline tolerance: $BASELINE_FAILURES)"
          if [ "$NUM_FAILED" -gt "$BASELINE_FAILURES" ]; then
            echo "::error::vitest failed $NUM_FAILED tests, exceeds baseline tolerance of $BASELINE_FAILURES."
            echo "::error::This means a NEW test regressed. Investigate the new failures, then either fix or update BASELINE_FAILURES in .github/workflows/validate.yml."
            exit 1
          fi
          echo "::notice::vitest within baseline tolerance ($NUM_FAILED <= $BASELINE_FAILURES)."

      - name: Upload vitest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: pforge-mcp/vitest-results.json
          retention-days: 14
