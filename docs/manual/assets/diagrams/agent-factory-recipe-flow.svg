<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <title>Agent Factory Recipe — 7-step flow from substrate check to iteration</title>
  <style>
    text { font-family: 'Inter', sans-serif; }
    .node { rx: 8; ry: 8; stroke-width: 1.5; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#afr-ah); }
    .label  { font-size: 11.5px; fill: #cbd5e1; }
    .small  { font-size: 11px; fill: #94a3b8; }
    .stepnum { font-size: 18px; font-weight: 700; }
    .stepname { font-size: 12.5px; font-weight: 700; fill: #f1f5f9; text-transform: uppercase; letter-spacing: 0.04em; }
    .phase  { font-size: 13px; fill: #f59e0b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .mono   { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; fill: #cbd5e1; }
    .out    { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #fcd34d; }
    .divider { stroke: #334155; stroke-width: 1; }
  </style>
  <defs>
    <marker id="afr-ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b" />
    </marker>
  </defs>

  <text x="400" y="22" class="phase" text-anchor="middle">FACTORY RECIPE · ONE WORK DAY · REPLICATES IN ONE HOUR</text>

  <!-- ── Step 1 — SUBSTRATE ── blue -->
  <rect x="20" y="40" width="100" height="240" class="node" fill="#0f172a" stroke="#60a5fa" />
  <text x="70" y="65" class="stepnum" fill="#60a5fa" text-anchor="middle">1</text>
  <text x="70" y="90" class="stepname" text-anchor="middle">Substrate</text>
  <text x="70" y="112" class="mono" text-anchor="middle">15 min</text>
  <line x1="30" y1="125" x2="110" y2="125" class="divider" />
  <text x="70" y="145" class="label" text-anchor="middle">Verify GitHub</text>
  <text x="70" y="160" class="label" text-anchor="middle">Copilot, CCA,</text>
  <text x="70" y="175" class="label" text-anchor="middle">Actions, MCP,</text>
  <text x="70" y="190" class="label" text-anchor="middle">AGENTS.md</text>
  <text x="70" y="205" class="label" text-anchor="middle">tooling</text>
  <line x1="30" y1="225" x2="110" y2="225" class="divider" />
  <text x="70" y="244" class="small" text-anchor="middle">produces</text>
  <text x="70" y="262" class="out" text-anchor="middle">green-light</text>

  <!-- ── Step 2 — CONFIGURE ── amber -->
  <rect x="130" y="40" width="100" height="240" class="node" fill="#0f172a" stroke="#fbbf24" />
  <text x="180" y="65" class="stepnum" fill="#fbbf24" text-anchor="middle">2</text>
  <text x="180" y="90" class="stepname" text-anchor="middle">Configure</text>
  <text x="180" y="112" class="mono" text-anchor="middle">2 hr</text>
  <line x1="140" y1="125" x2="220" y2="125" class="divider" />
  <text x="180" y="145" class="label" text-anchor="middle">Run profile +</text>
  <text x="180" y="160" class="label" text-anchor="middle">principles</text>
  <text x="180" y="175" class="label" text-anchor="middle">prompts. Facts</text>
  <text x="180" y="190" class="label" text-anchor="middle">about stack +</text>
  <text x="180" y="205" class="label" text-anchor="middle">commitments.</text>
  <line x1="140" y1="225" x2="220" y2="225" class="divider" />
  <text x="180" y="244" class="small" text-anchor="middle">produces</text>
  <text x="180" y="258" class="out" text-anchor="middle">profile +</text>
  <text x="180" y="272" class="out" text-anchor="middle">principles</text>

  <!-- ── Step 3 — ROUTE ── amber -->
  <rect x="240" y="40" width="100" height="240" class="node" fill="#0f172a" stroke="#fbbf24" />
  <text x="290" y="65" class="stepnum" fill="#fbbf24" text-anchor="middle">3</text>
  <text x="290" y="90" class="stepname" text-anchor="middle">Route</text>
  <text x="290" y="112" class="mono" text-anchor="middle">30 min</text>
  <line x1="250" y1="125" x2="330" y2="125" class="divider" />
  <text x="290" y="145" class="label" text-anchor="middle">Assign agents</text>
  <text x="290" y="160" class="label" text-anchor="middle">to lanes. Set</text>
  <text x="290" y="175" class="label" text-anchor="middle">owner, trigger,</text>
  <text x="290" y="190" class="label" text-anchor="middle">authority for</text>
  <text x="290" y="205" class="label" text-anchor="middle">each persona.</text>
  <line x1="250" y1="225" x2="330" y2="225" class="divider" />
  <text x="290" y="244" class="small" text-anchor="middle">produces</text>
  <text x="290" y="262" class="out" text-anchor="middle">ROUTING.md</text>

  <!-- ── Step 4 — CONTEXT ── amber -->
  <rect x="350" y="40" width="100" height="240" class="node" fill="#0f172a" stroke="#fbbf24" />
  <text x="400" y="65" class="stepnum" fill="#fbbf24" text-anchor="middle">4</text>
  <text x="400" y="90" class="stepname" text-anchor="middle">Context</text>
  <text x="400" y="112" class="mono" text-anchor="middle">2 hr</text>
  <line x1="360" y1="125" x2="440" y2="125" class="divider" />
  <text x="400" y="145" class="label" text-anchor="middle">Populate</text>
  <text x="400" y="160" class="label" text-anchor="middle">AGENTS.md +</text>
  <text x="400" y="175" class="label" text-anchor="middle">copilot-instr +</text>
  <text x="400" y="190" class="label" text-anchor="middle">18 guardrail</text>
  <text x="400" y="205" class="label" text-anchor="middle">files.</text>
  <line x1="360" y1="225" x2="440" y2="225" class="divider" />
  <text x="400" y="244" class="small" text-anchor="middle">produces</text>
  <text x="400" y="258" class="out" text-anchor="middle">shared</text>
  <text x="400" y="272" class="out" text-anchor="middle">knowledge</text>

  <!-- ── Step 5 — TOOLS ── amber -->
  <rect x="460" y="40" width="100" height="240" class="node" fill="#0f172a" stroke="#fbbf24" />
  <text x="510" y="65" class="stepnum" fill="#fbbf24" text-anchor="middle">5</text>
  <text x="510" y="90" class="stepname" text-anchor="middle">Tools</text>
  <text x="510" y="112" class="mono" text-anchor="middle">30 min</text>
  <line x1="470" y1="125" x2="550" y2="125" class="divider" />
  <text x="510" y="145" class="label" text-anchor="middle">Wire MCP</text>
  <text x="510" y="160" class="label" text-anchor="middle">servers: Plan</text>
  <text x="510" y="175" class="label" text-anchor="middle">Forge, github,</text>
  <text x="510" y="190" class="label" text-anchor="middle">Foundry, ADO</text>
  <text x="510" y="205" class="label" text-anchor="middle">(optional).</text>
  <line x1="470" y1="225" x2="550" y2="225" class="divider" />
  <text x="510" y="244" class="small" text-anchor="middle">produces</text>
  <text x="510" y="262" class="out" text-anchor="middle">mcp.json</text>

  <!-- ── Step 6 — PILOT ── green -->
  <rect x="570" y="40" width="100" height="240" class="node" fill="#0f172a" stroke="#34d399" />
  <text x="620" y="65" class="stepnum" fill="#34d399" text-anchor="middle">6</text>
  <text x="620" y="90" class="stepname" text-anchor="middle">Pilot</text>
  <text x="620" y="112" class="mono" text-anchor="middle">1–2 hr</text>
  <line x1="580" y1="125" x2="660" y2="125" class="divider" />
  <text x="620" y="145" class="label" text-anchor="middle">Run one real</text>
  <text x="620" y="160" class="label" text-anchor="middle">plan end-to-</text>
  <text x="620" y="175" class="label" text-anchor="middle">end. Capture</text>
  <text x="620" y="190" class="label" text-anchor="middle">drift, gate</text>
  <text x="620" y="205" class="label" text-anchor="middle">failures, cost.</text>
  <line x1="580" y1="225" x2="660" y2="225" class="divider" />
  <text x="620" y="244" class="small" text-anchor="middle">produces</text>
  <text x="620" y="262" class="out" text-anchor="middle">friction log</text>

  <!-- ── Step 7 — ITERATE ── purple -->
  <rect x="680" y="40" width="100" height="240" class="node" fill="#0f172a" stroke="#c4b5fd" />
  <text x="730" y="65" class="stepnum" fill="#c4b5fd" text-anchor="middle">7</text>
  <text x="730" y="90" class="stepname" text-anchor="middle">Iterate</text>
  <text x="730" y="112" class="mono" text-anchor="middle">ongoing</text>
  <line x1="690" y1="125" x2="770" y2="125" class="divider" />
  <text x="730" y="145" class="label" text-anchor="middle">Encode each</text>
  <text x="730" y="160" class="label" text-anchor="middle">lesson into</text>
  <text x="730" y="175" class="label" text-anchor="middle">an instruction</text>
  <text x="730" y="190" class="label" text-anchor="middle">file. Compound</text>
  <text x="730" y="205" class="label" text-anchor="middle">over plans.</text>
  <line x1="690" y1="225" x2="770" y2="225" class="divider" />
  <text x="730" y="244" class="small" text-anchor="middle">produces</text>
  <text x="730" y="262" class="out" text-anchor="middle">tuned fleet</text>

  <!-- arrows between boxes -->
  <path d="M120,160 L130,160" class="arrow" />
  <path d="M230,160 L240,160" class="arrow" />
  <path d="M340,160 L350,160" class="arrow" />
  <path d="M450,160 L460,160" class="arrow" />
  <path d="M560,160 L570,160" class="arrow" />
  <path d="M670,160 L680,160" class="arrow" />

  <!-- legend -->
  <rect x="20" y="300" width="14" height="14" rx="3" ry="3" fill="#0f172a" stroke="#60a5fa" />
  <text x="40" y="312" class="small">Prerequisite</text>
  <rect x="130" y="300" width="14" height="14" rx="3" ry="3" fill="#0f172a" stroke="#fbbf24" />
  <text x="150" y="312" class="small">Configuration (4 hr)</text>
  <rect x="300" y="300" width="14" height="14" rx="3" ry="3" fill="#0f172a" stroke="#34d399" />
  <text x="320" y="312" class="small">Run</text>
  <rect x="370" y="300" width="14" height="14" rx="3" ry="3" fill="#0f172a" stroke="#c4b5fd" />
  <text x="390" y="312" class="small">Learn</text>
  <text x="780" y="312" class="small" text-anchor="end">Step&#160;1 (preflight) is a prompt, not an agent</text>
</svg>
