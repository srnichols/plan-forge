<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- Background -->
  <rect width="900" height="600" fill="#0f172a"/>

  <!-- Outer Azure tenant boundary -->
  <rect x="20" y="20" width="860" height="560" rx="14" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="40" y="48" fill="#94a3b8" font-size="14" font-weight="700">CUSTOMER'S AZURE TENANT</text>

  <!-- Top row: 3 boxes -->
  <!-- Plan Forge -->
  <rect x="60" y="80" width="240" height="100" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="180" y="108" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">Plan Forge</text>
  <text x="180" y="130" fill="#cbd5e1" font-size="11" text-anchor="middle">(open source,</text>
  <text x="180" y="146" fill="#cbd5e1" font-size="11" text-anchor="middle">in customer</text>
  <text x="180" y="162" fill="#cbd5e1" font-size="11" text-anchor="middle">repo / CI)</text>

  <!-- Microsoft Foundry -->
  <rect x="330" y="80" width="240" height="100" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="450" y="108" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Microsoft Foundry</text>
  <text x="450" y="130" fill="#cbd5e1" font-size="11" text-anchor="middle">(model gateway,</text>
  <text x="450" y="146" fill="#cbd5e1" font-size="11" text-anchor="middle">AOAI endpoint)</text>

  <!-- Foundry Agent Service -->
  <rect x="600" y="80" width="240" height="100" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="720" y="108" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Foundry Agent Service</text>
  <text x="720" y="130" fill="#cbd5e1" font-size="11" text-anchor="middle">(production</text>
  <text x="720" y="146" fill="#cbd5e1" font-size="11" text-anchor="middle">agent runtime)</text>

  <!-- Arrows: Plan Forge -> Foundry, Agent Service -> Foundry -->
  <line x1="300" y1="130" x2="325" y2="130" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="330,130 320,125 320,135" fill="#94a3b8"/>
  <line x1="600" y1="130" x2="575" y2="130" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="570,130 580,125 580,135" fill="#94a3b8"/>

  <!-- Plan Forge -> Foundry Toolbox (down-right) -->
  <line x1="180" y1="180" x2="380" y2="245" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="385,247 374,243 379,253" fill="#94a3b8"/>

  <!-- Foundry Agent Service -> Foundry Toolbox (down-left) -->
  <line x1="720" y1="180" x2="520" y2="245" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="515,247 521,253 526,243" fill="#94a3b8"/>

  <!-- Foundry Toolbox (middle) -->
  <rect x="330" y="248" width="240" height="72" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="450" y="276" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Foundry Toolbox</text>
  <text x="450" y="298" fill="#cbd5e1" font-size="11" text-anchor="middle">(MCP endpoint — shared</text>
  <text x="450" y="312" fill="#cbd5e1" font-size="11" text-anchor="middle">tool surface for both)</text>

  <!-- Arrow down to bottom row -->
  <line x1="450" y1="320" x2="450" y2="358" stroke="#64748b" stroke-width="2"/>
  <polygon points="450,363 444,353 456,353" fill="#64748b"/>

  <!-- Bottom row: 3 supporting blocks -->
  <rect x="60" y="370" width="240" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="180" y="398" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">App Insights</text>
  <text x="180" y="420" fill="#cbd5e1" font-size="11" text-anchor="middle">(OTel sink)</text>
  <text x="180" y="438" fill="#94a3b8" font-size="10" text-anchor="middle">gen_ai.* spans land here</text>

  <rect x="330" y="370" width="240" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="450" y="398" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Entra ID</text>
  <text x="450" y="420" fill="#cbd5e1" font-size="11" text-anchor="middle">(auth)</text>
  <text x="450" y="438" fill="#94a3b8" font-size="10" text-anchor="middle">DefaultAzureCredential</text>

  <rect x="600" y="370" width="240" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="720" y="398" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Private VNet</text>
  <text x="720" y="420" fill="#cbd5e1" font-size="11" text-anchor="middle">(isolation)</text>
  <text x="720" y="438" fill="#94a3b8" font-size="10" text-anchor="middle">customer-controlled egress</text>

  <!-- Caption -->
  <text x="450" y="500" fill="#94a3b8" font-size="13" font-weight="700" text-anchor="middle">Plan Forge sits ABOVE Foundry as the SDLC orchestrator.</text>
  <text x="450" y="522" fill="#94a3b8" font-size="11" text-anchor="middle">Foundry is the model gateway and production agent runtime.</text>
  <text x="450" y="540" fill="#94a3b8" font-size="11" text-anchor="middle">They share Foundry Toolbox for tools and App Insights for telemetry.</text>
  <text x="450" y="562" fill="#64748b" font-size="11" font-style="italic" text-anchor="middle">Not inside Foundry — above it. Higher-altitude orchestration layer.</text>
</svg>
