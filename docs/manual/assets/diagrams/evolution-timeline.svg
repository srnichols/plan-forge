<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320" fill="none" role="img" aria-labelledby="evt-title evt-desc">
  <title id="evt-title">Plan Forge evolution timeline v1.0 to v3.6</title>
  <desc id="evt-desc">Horizontal timeline showing Plan Forge's eight headline version milestones from Summer 2025 (v1.0, 18 instruction files plus 4-session pipeline) through May 2026 (v3.6, OpenBrain promoted to L3 memory layer). Intermediate milestones: v2.0 January 2026 (autonomous orchestrator and DAG-based execution), v2.5 February 2026 (Quorum Mode multi-model consensus), v2.10 March 2026 (OpenClaw bridge for cross-platform notifications), v2.14 March 2026 (Copilot platform integration), v2.18 April 2026 (Temper Guards and Warning Signs and Context Fuel), v2.83 May 2026 (host-aware routing plus quorum estimator plus complexity rubric). The current milestone v3.6 is highlighted in amber. The May 2026 v3.x sprint also included v2.95 Lattice code-graph indexing, v3.0 Copilot integration trilogy, and v3.2 through v3.4 Team Mode, which are covered in the chapter prose.</desc>
  <style>
    text { font-family: 'Inter', sans-serif; }
    .title-text { font-size: 15px; fill: #f1f5f9; font-weight: 700; }
    .subtitle { font-size: 13.5px; fill: #cbd5e1; }
    .axis-line { stroke: #475569; stroke-width: 2; }
    .marker { fill: #1e293b; stroke: #64748b; stroke-width: 2; }
    .marker-current { fill: #1e293b; stroke: #f59e0b; stroke-width: 2.5; }
    .version-label { font-size: 15px; fill: #f1f5f9; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .version-current { font-size: 15px; fill: #f59e0b; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .date-label { font-size: 15px; fill: #cbd5e1; }
    .date-current { font-size: 15px; fill: #fcd34d; font-weight: 600; }
    .feature-label { font-size: 10px; fill: #cbd5e1; }
    .feature-current { font-size: 10px; fill: #fde68a; font-weight: 500; }
    .footnote { font-size: 13.5px; fill: #cbd5e1; }
  </style>

  <!-- Title -->
  <text x="550" y="26" class="title-text" text-anchor="middle">From "impossible" to 7 minutes — a year of building AI coding guardrails</text>
  <text x="550" y="44" class="subtitle" text-anchor="middle">Eight headline inflection points (v1.0 → v3.6), Summer 2025 → May 2026</text>

  <!-- Timeline axis -->
  <line x1="60" y1="160" x2="1040" y2="160" class="axis-line" />

  <!-- 8 markers spaced 130px apart, range 90..1000 -->

  <!-- v1.0 -->
