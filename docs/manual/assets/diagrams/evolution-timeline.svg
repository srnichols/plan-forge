  <!-- Footer attribution -->
  <text x="60" y="290" class="footnote">Source: docs/blog/the-journey-from-impossible-to-seven-minutes.html (historical narrative through April 2026; v2.83 and v2.95→v3.6 added per CHANGELOG.md)</text>
