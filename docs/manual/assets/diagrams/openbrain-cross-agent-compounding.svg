<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" fill="none" role="img" aria-labelledby="obca-title obca-desc">
  <title id="obca-title">OpenBrain cross-agent compounding</title>
  <desc id="obca-desc">OpenBrain acts as a shared memory layer between AI agents — Claude, Cursor, and Copilot each capture decisions (capture_thought) and retrieve prior context (search_thoughts). Knowledge compounds across agents and sessions so each slice benefits from every previous run.</desc>
  <style>
    text { font-family: 'Inter', sans-serif; }
    .node { rx: 8; ry: 8; stroke-width: 1.5; }
    .arrow { stroke: #64748b; stroke-width: 1.4; fill: none; marker-end: url(#obca-ah); }
    .arrow-write { stroke: #f59e0b; stroke-width: 1.8; fill: none; marker-end: url(#obca-ah-amber); }
    .arrow-read  { stroke: #60a5fa; stroke-width: 1.8; fill: none; marker-end: url(#obca-ah-blue); }
    .label  { font-size: 11.5px; fill: #cbd5e1; }
    .micro  { font-size: 10.5px; fill: #cbd5e1; }
    .title  { font-size: 12.5px; fill: #f1f5f9; font-weight: 600; }
    .phase  { font-size: 10.5px; fill: #fbbf24; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .mono   { font-size: 11px; fill: #fcd34d; font-family: 'JetBrains Mono', monospace; }
    .big    { font-size: 15px; fill: #f8fafc; font-weight: 700; }
    .caption { font-size: 10.5px; fill: #cbd5e1; font-style: italic; }
  </style>
  <defs>
    <marker id="obca-ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b" />
    </marker>
    <marker id="obca-ah-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b" />
    </marker>
    <marker id="obca-ah-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#60a5fa" />
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="820" height="480" fill="#0f172a" rx="10" />

  <!-- ══════════════════════════════════════════════
       COLUMN 1: AI Agents (left)
       ══════════════════════════════════════════════ -->
  <text x="110" y="22" class="phase" text-anchor="middle">AI AGENTS</text>

  <!-- Claude -->
  <rect x="20" y="35" width="180" height="56" class="node" fill="#0f172a" stroke="#a78bfa" />
  <text x="110" y="56" class="big" text-anchor="middle">Claude</text>
  <text x="110" y="73" class="micro" text-anchor="middle">Anthropic · plan execution</text>
  <text x="110" y="85" class="micro" text-anchor="middle">pforge run-plan, gh-copilot-worker</text>

  <!-- Cursor -->
  <rect x="20" y="115" width="180" height="56" class="node" fill="#0f172a" stroke="#34d399" />
  <text x="110" y="136" class="big" text-anchor="middle">Cursor</text>
  <text x="110" y="153" class="micro" text-anchor="middle">Cursor IDE · code editing</text>
  <text x="110" y="165" class="micro" text-anchor="middle">background agent, composer mode</text>

  <!-- Copilot -->
  <rect x="20" y="195" width="180" height="56" class="node" fill="#0f172a" stroke="#60a5fa" />
  <text x="110" y="216" class="big" text-anchor="middle">Copilot</text>
  <text x="110" y="233" class="micro" text-anchor="middle">GitHub Copilot CLI · review &amp; ship</text>
  <text x="110" y="245" class="micro" text-anchor="middle">code-review agent, shipper agent</text>

  <!-- Future / generic agent -->
  <rect x="20" y="275" width="180" height="40" class="node" fill="#0f172a" stroke="#334155" />
  <text x="110" y="291" class="label" text-anchor="middle">future agents</text>
  <text x="110" y="306" class="micro" text-anchor="middle">any MCP-capable client</text>


  <!-- ══════════════════════════════════════════════
       COLUMN 2: OpenBrain (center)
       ══════════════════════════════════════════════ -->
  <text x="410" y="22" class="phase" text-anchor="middle">OPENBRAIN SHARED MEMORY</text>

  <!-- Main OpenBrain box -->
  <rect x="290" y="35" width="240" height="180" class="node" fill="#1e1a2e" stroke="#f59e0b" />
  <text x="410" y="62" class="title" text-anchor="middle" font-size="13">OpenBrain</text>
  <text x="410" y="80" class="mono" text-anchor="middle">capture_thought()</text>
  <text x="410" y="96" class="label" text-anchor="middle">persist a decision or lesson</text>
  <text x="410" y="118" class="mono" text-anchor="middle">search_thoughts()</text>
  <text x="410" y="134" class="label" text-anchor="middle">retrieve relevant prior context</text>

  <line x1="302" y1="144" x2="518" y2="144" stroke="#334155" stroke-width="1" />
  <text x="410" y="160" class="micro" text-anchor="middle">storage: .forge/openbrain/ (JSONL)</text>
  <text x="410" y="178" class="micro" text-anchor="middle">scoped by project + source path</text>
  <text x="410" y="196" class="micro" text-anchor="middle">BM25 + semantic re-ranking</text>

  <!-- Thought store tiers (taller to fit larger fonts comfortably) -->
  <rect x="290" y="240" width="240" height="100" class="node" fill="#0f172a" stroke="#334155" />
  <text x="410" y="260" class="phase" text-anchor="middle">THOUGHT TIERS</text>
  <text x="302" y="282" class="label">convention</text>
  <text x="302" y="302" class="label">lesson</text>
  <text x="302" y="322" class="label">decision</text>
  <text x="410" y="282" class="micro">naming, patterns, guardrails</text>
  <text x="410" y="302" class="micro">gotchas, dead-ends, warnings</text>
  <text x="410" y="322" class="micro">arch choices + rationale</text>

  <!-- Compound counter badge (shifted down for taller tier box) -->
  <rect x="300" y="355" width="220" height="44" class="node" fill="#1e293b" stroke="#f59e0b" />
  <text x="410" y="374" class="phase" text-anchor="middle">COMPOUNDING EFFECT</text>
  <text x="410" y="391" class="label" text-anchor="middle">each capture raises signal quality for all future agents</text>


  <!-- ══════════════════════════════════════════════
       COLUMN 3: Outcomes (right)
       ══════════════════════════════════════════════ -->
  <text x="700" y="22" class="phase" text-anchor="middle">OUTCOMES</text>

  <rect x="590" y="35" width="210" height="46" class="node" fill="#0f172a" stroke="#34d399" />
  <text x="695" y="54" class="title" text-anchor="middle">No repeated mistakes</text>
  <text x="695" y="70" class="micro" text-anchor="middle">gotchas captured once, reused forever</text>

  <rect x="590" y="92" width="210" height="46" class="node" fill="#0f172a" stroke="#60a5fa" />
  <text x="695" y="111" class="title" text-anchor="middle">Faster ramp-up</text>
  <text x="695" y="127" class="micro" text-anchor="middle">search_thoughts at session start</text>

  <rect x="590" y="149" width="210" height="46" class="node" fill="#0f172a" stroke="#a78bfa" />
  <text x="695" y="168" class="title" text-anchor="middle">Pattern consistency</text>
  <text x="695" y="184" class="micro" text-anchor="middle">conventions shared across agents + IDEs</text>

  <rect x="590" y="206" width="210" height="46" class="node" fill="#0f172a" stroke="#fb7185" />
  <text x="695" y="225" class="title" text-anchor="middle">Architecture integrity</text>
  <text x="695" y="241" class="micro" text-anchor="middle">decisions survive session boundaries</text>


  <!-- ══════════════════════════════════════════════
       ARROWS — paired write (capture, amber) above
                read (search, blue) below for each row
       ══════════════════════════════════════════════ -->
  <!-- Claude row -->
  <path d="M200,55 Q245,55 290,62" class="arrow-write" />
  <text x="245" y="47" class="caption" text-anchor="middle">capture</text>
  <path d="M290,80 Q245,88 200,78" class="arrow-read" />
  <text x="245" y="102" class="caption" text-anchor="middle" fill="#60a5fa">search</text>

  <!-- Cursor row -->
  <path d="M200,130 L290,130" class="arrow-write" />
  <text x="245" y="122" class="caption" text-anchor="middle">capture</text>
  <path d="M290,158 L200,158" class="arrow-read" />
  <text x="245" y="172" class="caption" text-anchor="middle" fill="#60a5fa">search</text>

  <!-- Copilot row -->
  <path d="M200,212 Q245,208 290,185" class="arrow-write" />
  <text x="245" y="197" class="caption" text-anchor="middle">capture</text>
  <path d="M290,200 Q245,225 200,235" class="arrow-read" />
  <text x="245" y="246" class="caption" text-anchor="middle" fill="#60a5fa">search</text>

  <!-- future agent → OpenBrain (dashed, neutral) -->
  <path d="M200,292 L290,280" stroke="#334155" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#obca-ah)" />

  <!-- ══════════════════════════════════════════════
       ARROWS — OpenBrain → outcomes
       ══════════════════════════════════════════════ -->
  <path d="M530,80 L590,58" class="arrow" />
  <path d="M530,120 L590,115" class="arrow" />
  <path d="M530,160 L590,172" class="arrow" />
  <path d="M530,185 L590,229" class="arrow" />

  <!-- ══════════════════════════════════════════════
       FOOTER (taller, two-line usage pattern)
       ══════════════════════════════════════════════ -->
  <rect x="20" y="406" width="780" height="66" class="node" fill="#1e293b" stroke="#334155" />
  <text x="34" y="424" class="title">📡 Usage pattern:</text>
  <text x="34" y="441" class="label">Session start → <tspan class="mono">search_thoughts(query, project:"Plan-Forge", limit:5)</tspan></text>
  <text x="34" y="456" class="label">After a key decision → <tspan class="mono">capture_thought(content, project:"Plan-Forge", source:"…/slice-N")</tspan></text>
  <text x="34" y="469" class="micro" fill="#cbd5e1">Claude, Cursor, and Copilot all operate on the same OpenBrain store — each slice they execute raises the quality floor for every future agent.</text>
</svg>
