<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" fill="none">
  <style>
    text { font-family: 'Inter', sans-serif; }
    .node { rx: 8; ry: 8; stroke-width: 1.5; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#rbah); }
    .arrow-event { stroke: #fbbf24; stroke-width: 2; fill: none; marker-end: url(#rbahe); }
    .arrow-approval { stroke: #34d399; stroke-width: 2; fill: none; stroke-dasharray: 5 3; marker-end: url(#rbaha); }
    .label { font-size: 15px; fill: #cbd5e1; }
    .small { font-size: 13.5px; fill: #cbd5e1; }
    .title { font-size: 13.5px; fill: #f1f5f9; font-weight: 600; }
    .phase { font-size: 13.5px; fill: #f59e0b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .ch-name { font-size: 15px; font-weight: 600; }
    .surf { font-size: 13.5px; font-family: 'JetBrains Mono', monospace; fill: #cbd5e1; }
    .approve { fill: #6ee7b7; }
  </style>
  <defs>
    <marker id="rbah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b" />
    </marker>
    <marker id="rbahe" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fbbf24" />
    </marker>
    <marker id="rbaha" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399" />
    </marker>
  </defs>

  <!-- ─── Source: Hub events ─── -->
  <text x="100" y="20" class="phase" text-anchor="middle">SOURCE</text>
  <rect x="20" y="35" width="160" height="90" class="node" fill="#0f172a" stroke="#fbbf24" />
  <text x="100" y="55" class="title" text-anchor="middle">WebSocket Hub</text>
  <text x="100" y="71" class="surf" text-anchor="middle">ws://localhost:3101</text>
  <text x="100" y="88" class="small" text-anchor="middle">approval-requested</text>
  <text x="100" y="100" class="small" text-anchor="middle">incident-fired · drift-alert</text>
  <text x="100" y="115" class="small" text-anchor="middle">slice-failed · quorum-tie</text>

  <!-- Arrow to router -->
  <path d="M180,80 L240,80" class="arrow-event" />

  <!-- ─── Router ─── -->
  <text x="320" y="20" class="phase" text-anchor="middle">ROUTER</text>
  <rect x="240" y="35" width="160" height="90" class="node" fill="#0f172a" stroke="#fbbf24" />
  <text x="320" y="55" class="title" text-anchor="middle">forge_notify_send</text>
  <text x="320" y="71" class="small" text-anchor="middle">+ rate limits per-channel</text>
  <text x="320" y="86" class="small" text-anchor="middle">+ severity filter</text>
  <text x="320" y="101" class="small" text-anchor="middle">+ message template</text>
  <text x="320" y="116" class="surf" text-anchor="middle">.forge.json#bridge</text>

  <!-- Fan-out arrows -->
  <path d="M400,55 L480,40" class="arrow-event" />
  <path d="M400,65 L480,90" class="arrow-event" />
  <path d="M400,80 L480,140" class="arrow-event" />
  <path d="M400,95 L480,190" class="arrow-event" />
  <path d="M400,108 L480,240" class="arrow-event" />
  <path d="M400,120 L480,290" class="arrow-event" />

  <!-- ─── 6 Channels ─── -->
  <text x="630" y="20" class="phase" text-anchor="middle">CHANNELS</text>

  <rect x="480" y="30" width="280" height="40" class="node" fill="#0f172a" stroke="#0ea5e9" />
  <text x="500" y="55" class="ch-name" style="fill:#0ea5e9;">📨 Telegram</text>
  <text x="760" y="55" class="approve" text-anchor="end">✓ inline approval</text>

  <rect x="480" y="80" width="280" height="40" class="node" fill="#0f172a" stroke="#a855f7" />
  <text x="500" y="105" class="ch-name" style="fill:#a855f7;">💬 Slack</text>
  <text x="760" y="105" class="approve" text-anchor="end">✓ button approval</text>

  <rect x="480" y="130" width="280" height="40" class="node" fill="#0f172a" stroke="#5865f2" />
  <text x="500" y="155" class="ch-name" style="fill:#818cf8;">🎮 Discord</text>
  <text x="760" y="155" class="approve" text-anchor="end">✓ reaction approval</text>

  <rect x="480" y="180" width="280" height="40" class="node" fill="#0f172a" stroke="#0078d4" />
  <text x="500" y="205" class="ch-name" style="fill:#60a5fa;">🟦 Microsoft Teams</text>
  <text x="760" y="205" class="small" text-anchor="end">webhook only</text>

  <rect x="480" y="230" width="280" height="40" class="node" fill="#0f172a" stroke="#fb7185" />
  <text x="500" y="255" class="ch-name" style="fill:#fb7185;">🚨 PagerDuty</text>
  <text x="760" y="255" class="small" text-anchor="end">incidents only</text>

  <rect x="480" y="280" width="280" height="40" class="node" fill="#0f172a" stroke="#fbbf24" />
  <text x="500" y="305" class="ch-name" style="fill:#fbbf24;">🐺 OpenClaw</text>
  <text x="760" y="305" class="approve" text-anchor="end">✓ rich approval flows</text>

  <!-- ─── Approval back-flow ─── -->
  <path d="M760,55 Q780,200 320,335 L320,125" class="arrow-approval" />
  <text x="540" y="350" class="label approve" text-anchor="middle">approval-resolved hub event ← user response (Telegram / Slack / Discord / OpenClaw)</text>
  <text x="100" y="368" class="small" text-anchor="middle">→ resumes paused slice / closes incident / breaks quorum tie</text>
</svg>
