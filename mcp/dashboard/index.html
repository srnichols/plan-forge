<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Forge Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🔨</text></svg>">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .slice-card { transition: all 0.3s ease; }
    .slice-executing { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
    .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <!-- Header -->
  <header class="bg-gray-800 border-b border-gray-700 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🔨</span>
      <h1 class="text-xl font-bold text-white">Plan Forge</h1>
      <span id="connection-badge" class="text-xs px-2 py-0.5 rounded-full bg-red-900 text-red-300">disconnected</span>
    </div>
    <div class="flex items-center gap-4 text-sm text-gray-400">
      <span id="run-status">Idle</span>
      <span id="ws-port"></span>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="bg-gray-800 border-b border-gray-700 flex gap-1 px-4 text-sm">
    <button class="tab-btn tab-active px-4 py-2 hover:text-blue-400" data-tab="progress">Progress</button>
    <button class="tab-btn px-4 py-2 hover:text-blue-400 text-gray-400" data-tab="runs">Runs</button>
    <button class="tab-btn px-4 py-2 hover:text-blue-400 text-gray-400" data-tab="cost">Cost</button>
    <button class="tab-btn px-4 py-2 hover:text-blue-400 text-gray-400" data-tab="actions">Actions</button>
  </nav>

  <!-- Tab Content -->
  <main class="p-4 max-w-6xl mx-auto">

    <!-- Progress Tab -->
    <section id="tab-progress" class="tab-content">
      <!-- Run summary bar -->
      <div id="run-summary" class="bg-gray-800 rounded-lg p-4 mb-4 flex items-center justify-between">
        <div>
          <h2 id="run-plan-name" class="text-lg font-semibold">No active run</h2>
          <p id="run-progress-text" class="text-sm text-gray-400">Start a run with <code class="bg-gray-700 px-1 rounded">pforge run-plan</code></p>
        </div>
        <div id="run-progress-bar" class="w-48 h-2 bg-gray-700 rounded-full overflow-hidden hidden">
          <div id="run-progress-fill" class="h-full bg-blue-500 transition-all duration-500" style="width:0%"></div>
        </div>
      </div>

      <!-- Slice cards -->
      <div id="slice-cards" class="grid gap-3 md:grid-cols-2 lg:grid-cols-3">
        <div class="text-gray-500 text-center py-12">Waiting for run events...</div>
      </div>
    </section>

    <!-- Runs Tab -->
    <section id="tab-runs" class="tab-content hidden">
      <div class="bg-gray-800 rounded-lg overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-700">
            <tr>
              <th class="px-4 py-2 text-left">Date</th>
              <th class="px-4 py-2 text-left">Plan</th>
              <th class="px-4 py-2 text-center">Slices</th>
              <th class="px-4 py-2 text-center">Status</th>
              <th class="px-4 py-2 text-right">Cost</th>
              <th class="px-4 py-2 text-right">Duration</th>
            </tr>
          </thead>
          <tbody id="runs-table-body">
            <tr><td colspan="6" class="px-4 py-8 text-center text-gray-500">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Cost Tab -->
    <section id="tab-cost" class="tab-content hidden">
      <div class="grid gap-4 md:grid-cols-3 mb-4">
        <div class="bg-gray-800 rounded-lg p-4">
          <p class="text-sm text-gray-400">Total Spend</p>
          <p id="cost-total" class="text-2xl font-bold text-green-400">$0.00</p>
        </div>
        <div class="bg-gray-800 rounded-lg p-4">
          <p class="text-sm text-gray-400">Total Runs</p>
          <p id="cost-runs" class="text-2xl font-bold">0</p>
        </div>
        <div class="bg-gray-800 rounded-lg p-4">
          <p class="text-sm text-gray-400">Total Tokens</p>
          <p id="cost-tokens" class="text-2xl font-bold">0</p>
        </div>
      </div>
      <div class="grid gap-4 md:grid-cols-2">
        <div class="bg-gray-800 rounded-lg p-4">
          <h3 class="text-sm text-gray-400 mb-2">Cost by Model</h3>
          <canvas id="chart-model-cost" height="200"></canvas>
        </div>
        <div class="bg-gray-800 rounded-lg p-4">
          <h3 class="text-sm text-gray-400 mb-2">Monthly Spend</h3>
          <canvas id="chart-monthly" height="200"></canvas>
        </div>
      </div>
    </section>

    <!-- Actions Tab -->
    <section id="tab-actions" class="tab-content hidden">
      <div class="grid gap-3 md:grid-cols-2 lg:grid-cols-3">
        <button onclick="runAction('smith')" class="action-btn bg-gray-800 hover:bg-gray-700 rounded-lg p-4 text-left transition">
          <div class="flex items-center gap-2 mb-1"><span>🔨</span><span class="font-semibold">Smith</span></div>
          <p class="text-sm text-gray-400">Diagnose environment &amp; setup</p>
        </button>
        <button onclick="runAction('sweep')" class="action-btn bg-gray-800 hover:bg-gray-700 rounded-lg p-4 text-left transition">
          <div class="flex items-center gap-2 mb-1"><span>🧹</span><span class="font-semibold">Sweep</span></div>
          <p class="text-sm text-gray-400">Find TODO/FIXME markers</p>
        </button>
        <button onclick="runAction('analyze', prompt('Plan path:'))" class="action-btn bg-gray-800 hover:bg-gray-700 rounded-lg p-4 text-left transition">
          <div class="flex items-center gap-2 mb-1"><span>📊</span><span class="font-semibold">Analyze</span></div>
          <p class="text-sm text-gray-400">Consistency score for a plan</p>
        </button>
        <button onclick="runAction('status')" class="action-btn bg-gray-800 hover:bg-gray-700 rounded-lg p-4 text-left transition">
          <div class="flex items-center gap-2 mb-1"><span>📋</span><span class="font-semibold">Status</span></div>
          <p class="text-sm text-gray-400">Phase status from roadmap</p>
        </button>
        <button onclick="runAction('check')" class="action-btn bg-gray-800 hover:bg-gray-700 rounded-lg p-4 text-left transition">
          <div class="flex items-center gap-2 mb-1"><span>✅</span><span class="font-semibold">Validate</span></div>
          <p class="text-sm text-gray-400">Check setup files</p>
        </button>
        <button onclick="runAction('ext search')" class="action-btn bg-gray-800 hover:bg-gray-700 rounded-lg p-4 text-left transition">
          <div class="flex items-center gap-2 mb-1"><span>🧩</span><span class="font-semibold">Extensions</span></div>
          <p class="text-sm text-gray-400">Browse extension catalog</p>
        </button>
      </div>
      <!-- Action result -->
      <div id="action-result" class="mt-4 hidden">
        <div class="bg-gray-800 rounded-lg p-4">
          <div class="flex justify-between items-center mb-2">
            <h3 id="action-result-title" class="font-semibold text-sm"></h3>
            <button onclick="document.getElementById('action-result').classList.add('hidden')" class="text-gray-500 hover:text-white">✕</button>
          </div>
          <pre id="action-result-output" class="text-xs text-gray-300 whitespace-pre-wrap max-h-64 overflow-y-auto"></pre>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
