# Plan Forge — Weekly Drift Detection
# Copy to .github/workflows/ and adjust cron schedule as needed.
#
# Runs LiveGuard drift analysis weekly. Auto-creates incidents for regressions.

name: Plan Forge Weekly Drift

on:
  schedule:
    - cron: '0 6 * * 1'   # 06:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: pforge-mcp

      - name: Run drift analysis
        run: ./pforge.sh drift --autoIncident

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: liveguard-drift-${{ github.run_id }}
          path: .forge/liveguard/
          retention-days: 30
